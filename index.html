<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <h1>Welcome to Your Finance Tracker</h1>
        <div class="nav-buttons">
            <button onclick="location.href='dashboard.html'">Dashboard</button>
            <button onclick="location.href='reports.html'">Reports</button>
            <button onclick="location.href='settings.html'">Settings</button>
        </div>
    </div>

    <div class="welcome-card">
        <h2>Hello, User! Get started with tracking your finances.</h2>
    </div>

    <div class="stat-cards">
        <div class="stat-card">
            <h3>Total Income</h3>
            <p>$X,XXX</p>
        </div>
        <div class="stat-card">
            <h3>Total Expenses</h3>
            <p>$X,XXX</p>
        </div>
        <div class="stat-card">
            <h3>Net Savings</h3>
            <p>$X,XXX</p>
        </div>
    </div>

    <div class="progress-bar">
        <h3>Savings Goal</h3>
        <div class="progress">
            <div class="progress-filled" style="width: 70%;"></div>
        </div>
        <p>70% of your savings goal achieved!</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
